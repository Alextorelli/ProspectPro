# ProspectPro Railway Configuration
# Production-ready deployment with Supabase Transaction Pooling optimization

[build]
builder = "NIXPACKS"
buildCommand = "npm ci --only=production"
watchPaths = ["server.js", "modules/**", "api/**", "public/**", "package.json"]

[deploy]
# Health check configuration for zero-downtime deployments
# Increased timeout to allow for connection pool warmup
healthcheckPath = "/health"
healthcheckTimeout = 90
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
numReplicas = 1

# Production start command with monitoring
startCommand = "node server.js"

# Sleep configuration for cost optimization
sleepApplication = false  # Keep alive for production monitoring
staticUrl = true         # Enable static URL for consistent monitoring

# Environment variables (Railway will inject from project settings)
[environment]
NODE_ENV = "production"
PORT = "8080"
# Optimize for Transaction Pooler (best for Railway stateless deployment)
SUPABASE_POOL_MODE = "transaction"

# Railway automatically injects these from your project settings:
# SUPABASE_URL = "${{SUPABASE_URL}}"
# SUPABASE_SERVICE_ROLE_KEY = "${{SUPABASE_SERVICE_ROLE_KEY}}"  
# GOOGLE_PLACES_API_KEY = "${{GOOGLE_PLACES_API_KEY}}"
#
# For optimal performance, also set in Railway dashboard:
# SUPABASE_DATABASE_URL_TRANSACTION = "postgresql://postgres:[password]@db.sriycekxdqnesdsgwiuc.supabase.co:6543/postgres"
# SUPABASE_DATABASE_URL_SESSION = "postgresql://postgres:[password]@db.sriycekxdqnesdsgwiuc.supabase.co:5432/postgres" (fallback)

# Resource monitoring and alerting
[observability]
enabled = true
alertOnHighCPU = true
alertOnHighMemory = true  
alertOnErrors = true

# Enable Railway's native analytics and cost monitoring
enableMetrics = true
enableLogs = true
logLevel = "info"

# Admin dashboard configuration
[admin]
# Custom admin dashboard available at /admin-dashboard.html
# Requires authentication via PERSONAL_ACCESS_TOKEN
dashboardPath = "/admin-dashboard.html"
enableBusinessMetrics = true
enableCostTracking = true
budgetAlerts = true